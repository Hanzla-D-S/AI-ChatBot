version: "3.9"

services:

  backend:
    build: .
    container_name: shopeasy_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./vector_store:/app/vector_store
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build: .
    container_name: shopeasy_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/chat
    depends_on:
      - backend
    restart: unless-stopped